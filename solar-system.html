<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Solar System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #scene { display: block; width: 100%; height: 100%; cursor: grab; }
  #scene:active { cursor: grabbing; }

  /* ---------- Control panel ---------- */
  #panel {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(10, 14, 30, 0.78);
    color: #e6ecff;
    font-family: "Segoe UI", Roboto, system-ui, sans-serif;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(120, 150, 255, 0.25);
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
    user-select: none;
    min-width: 210px;
    z-index: 10;
  }
  #panel h1 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 8px 0;
    font-size: 13px;
  }
  .row label { opacity: 0.9; }

  /* Toggle switch */
  .switch { position: relative; width: 42px; height: 22px; flex: 0 0 auto; }
  /* Invisible checkbox covers the whole switch so clicks register.
     Without this, width:0/height:0 left the toggle unclickable. */
  .switch input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    opacity: 0;
    cursor: pointer;
    z-index: 2;
  }
  .slider {
    position: absolute; inset: 0;
    background: #3a4358;
    border-radius: 22px;
    transition: background 0.25s;
    cursor: pointer;
  }
  .slider::before {
    content: "";
    position: absolute;
    height: 16px; width: 16px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.25s;
  }
  input:checked + .slider { background: #4f8cff; }
  input:checked + .slider::before { transform: translateX(20px); }

  /* Speed slider */
  input[type=range] {
    -webkit-appearance: none;
    width: 110px;
    height: 4px;
    border-radius: 4px;
    background: #3a4358;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #4f8cff;
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    border: none;
    border-radius: 50%;
    background: #4f8cff;
    cursor: pointer;
  }

  #hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: #9aa6cc;
    font-family: "Segoe UI", Roboto, system-ui, sans-serif;
    font-size: 12px;
    text-align: center;
    background: rgba(10, 14, 30, 0.6);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(120, 150, 255, 0.15);
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div id="panel">
  <h1>🪐 Solar System</h1>

  <div class="row">
    <label for="moonToggle">Show Moons</label>
    <div class="switch">
      <input type="checkbox" id="moonToggle" checked />
      <span class="slider"></span>
    </div>
  </div>

  <div class="row">
    <label for="orbitToggle">Show Orbits</label>
    <div class="switch">
      <input type="checkbox" id="orbitToggle" checked />
      <span class="slider"></span>
    </div>
  </div>

  <div class="row">
    <label>Speed</label>
    <input type="range" id="speed" min="0" max="300" value="100" />
  </div>
</div>

<div id="hint">Drag to rotate • Scroll to zoom • Right-click drag to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* =========================================================
   Scene setup
   ========================================================= */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);

const camera = new THREE.PerspectiveCamera(
  55, window.innerWidth / window.innerHeight, 0.1, 5000
);
camera.position.set(0, 90, 220);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 8;
controls.maxDistance = 1200;

/* =========================================================
   Starfield background
   ========================================================= */
(function makeStars() {
  const starGeo = new THREE.BufferGeometry();
  const starCount = 6000;
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 1500 + Math.random() * 1500;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: true });
  scene.add(new THREE.Points(starGeo, starMat));
})();

/* =========================================================
   The Sun
   ========================================================= */
const sunGroup = new THREE.Group();
scene.add(sunGroup);

const sun = new THREE.Mesh(
  new THREE.SphereGeometry(8, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xffcc33 })
);
sunGroup.add(sun);

// Glow halo
sun.add(new THREE.Mesh(
  new THREE.SphereGeometry(8.6, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffaa22, transparent: true, opacity: 0.25, side: THREE.BackSide })
));

// Sun light
const sunLight = new THREE.PointLight(0xffffff, 3, 0, 0.4);
sunGroup.add(sunLight);
scene.add(new THREE.AmbientLight(0x222244, 0.6));

/* =========================================================
   Texture helper – generate a canvas texture procedurally
   so the scene looks good with NO external image files.
   ========================================================= */
function makeTexture(baseColor, opts = {}) {
  const {
    bands = [],
    noise = 0.06,
    spots = 0,
    spotColor = '#000',
    size = 256
  } = opts;

  const c = document.createElement('canvas');
  c.width = size; c.height = size / 2;
  const ctx = c.getContext('2d');

  // base
  ctx.fillStyle = baseColor;
  ctx.fillRect(0, 0, c.width, c.height);

  // horizontal bands (gas giants / earth tones)
  bands.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.globalAlpha = b.alpha ?? 0.5;
    const y = b.y * c.height;
    const h = b.h * c.height;
    ctx.fillRect(0, y, c.width, h);
  });
  ctx.globalAlpha = 1;

  // fine noise grain
  const img = ctx.getImageData(0, 0, c.width, c.height);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 255 * noise;
    img.data[i]     = Math.max(0, Math.min(255, img.data[i]     + n));
    img.data[i + 1] = Math.max(0, Math.min(255, img.data[i + 1] + n));
    img.data[i + 2] = Math.max(0, Math.min(255, img.data[i + 2] + n));
  }
  ctx.putImageData(img, 0, 0);

  // random spots (craters / storms)
  for (let i = 0; i < spots; i++) {
    ctx.fillStyle = spotColor;
    ctx.globalAlpha = 0.25 + Math.random() * 0.4;
    ctx.beginPath();
    ctx.ellipse(
      Math.random() * c.width,
      Math.random() * c.height,
      2 + Math.random() * 8,
      2 + Math.random() * 8,
      0, 0, Math.PI * 2
    );
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

/* =========================================================
   Planet definitions
   size / distance / speed are stylised for readability,
   not to real scale.
   ========================================================= */
const planetData = [
  {
    name: 'Mercury', size: 1.1, distance: 18, speed: 1.6, spin: 0.004,
    color: '#9c8a78',
    tex: { noise: 0.10, spots: 60, spotColor: '#5a4d3e' }
  },
  {
    name: 'Venus', size: 2.4, distance: 26, speed: 1.18, spin: 0.002,
    color: '#e0b070',
    tex: { noise: 0.05, bands: [
      { color: '#c98a3a', y: 0.35, h: 0.08, alpha: 0.4 },
      { color: '#f0d090', y: 0.55, h: 0.10, alpha: 0.4 }
    ]}
  },
  {
    name: 'Earth', size: 2.6, distance: 36, speed: 1.0, spin: 0.02,
    color: '#2b6fb3',
    tex: { noise: 0.04, bands: [
      { color: '#3aa055', y: 0.30, h: 0.12, alpha: 0.55 },
      { color: '#2f8a4a', y: 0.55, h: 0.10, alpha: 0.5 }
    ]},
    moons: [{ name: 'Moon', size: 0.7, distance: 4.5, speed: 3.0, color: '#bfbfbf' }]
  },
  {
    name: 'Mars', size: 1.6, distance: 46, speed: 0.8, spin: 0.018,
    color: '#c1440e',
    tex: { noise: 0.07, spots: 25, spotColor: '#7a2a08' },
    moons: [
      { name: 'Phobos', size: 0.25, distance: 3.0, speed: 4.2, color: '#8a7d70' },
      { name: 'Deimos', size: 0.22, distance: 4.2, speed: 3.1, color: '#9a8d80' }
    ]
  },
  {
    name: 'Jupiter', size: 7.5, distance: 68, speed: 0.43, spin: 0.04,
    color: '#d8b48a',
    tex: { noise: 0.04, bands: [
      { color: '#b07a4a', y: 0.20, h: 0.07, alpha: 0.5 },
      { color: '#e8d2a8', y: 0.34, h: 0.06, alpha: 0.5 },
      { color: '#a86840', y: 0.50, h: 0.05, alpha: 0.5 },
      { color: '#e0c098', y: 0.62, h: 0.07, alpha: 0.5 },
      { color: '#9a5e38', y: 0.75, h: 0.06, alpha: 0.5 }
    ]},
    moons: [
      { name: 'Io',       size: 0.5, distance: 10, speed: 2.6, color: '#d8c850' },
      { name: 'Europa',   size: 0.45, distance: 12.5, speed: 2.1, color: '#cfc6b0' },
      { name: 'Ganymede', size: 0.7, distance: 15.5, speed: 1.6, color: '#8a8070' },
      { name: 'Callisto', size: 0.65, distance: 19, speed: 1.2, color: '#5a5247' }
    ]
  },
  {
    name: 'Saturn', size: 6.3, distance: 92, speed: 0.32, spin: 0.038,
    color: '#e3c98f',
    tex: { noise: 0.03, bands: [
      { color: '#c9a868', y: 0.25, h: 0.08, alpha: 0.45 },
      { color: '#f0dca8', y: 0.45, h: 0.10, alpha: 0.45 },
      { color: '#c2a05a', y: 0.62, h: 0.08, alpha: 0.45 }
    ]},
    ring: { inner: 8.5, outer: 13.5, color: '#cbb079' },
    moons: [
      { name: 'Titan',     size: 0.6, distance: 15, speed: 1.5, color: '#c8a050' },
      { name: 'Rhea',      size: 0.3, distance: 17.5, speed: 2.0, color: '#bdbdbd' },
      { name: 'Enceladus', size: 0.25, distance: 14, speed: 2.4, color: '#e8e8e8' }
    ]
  },
  {
    name: 'Uranus', size: 4.0, distance: 112, speed: 0.22, spin: 0.03,
    color: '#9fe0e8',
    tex: { noise: 0.03, bands: [
      { color: '#bfeef0', y: 0.4, h: 0.12, alpha: 0.35 },
      { color: '#7fc8d8', y: 0.6, h: 0.10, alpha: 0.35 }
    ]},
    ring: { inner: 5.5, outer: 7.5, color: '#88c0c8', tilt: Math.PI / 2.2 },
    moons: [
      { name: 'Titania', size: 0.3, distance: 6.5, speed: 2.0, color: '#b0a89c' },
      { name: 'Oberon',  size: 0.28, distance: 8, speed: 1.5, color: '#a89c8c' }
    ]
  },
  {
    name: 'Neptune', size: 3.9, distance: 130, speed: 0.18, spin: 0.032,
    color: '#3a5fd6',
    tex: { noise: 0.04, bands: [
      { color: '#2a4cb8', y: 0.4, h: 0.10, alpha: 0.45 },
      { color: '#5a7ce8', y: 0.6, h: 0.08, alpha: 0.4 }
    ], spots: 1, spotColor: '#1a2a66' },
    moons: [
      { name: 'Triton', size: 0.35, distance: 6.5, speed: 2.0, color: '#c8c8c0' }
    ]
  }
];

/* =========================================================
   Build planets + moons + orbit lines
   ========================================================= */
const planets = [];
const allMoons = [];          // collected for the toggle
const orbitLines = [];

function makeOrbitRing(radius) {
  const segments = 128;
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const t = (i / segments) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(t) * radius, 0, Math.sin(t) * radius));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.5 });
  return new THREE.Line(geo, mat);
}

planetData.forEach(p => {
  // Orbit pivot (rotates the planet around the sun)
  const pivot = new THREE.Object3D();
  scene.add(pivot);
  orbitLines.push(makeOrbitRing(p.distance));
  scene.add(orbitLines[orbitLines.length - 1]);

  // Planet body
  const mat = new THREE.MeshStandardMaterial({
    map: makeTexture(p.color, p.tex || {}),
    roughness: 0.85,
    metalness: 0.05
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.size, 48, 48), mat);
  mesh.position.x = p.distance;
  pivot.add(mesh);

  // Rings
  if (p.ring) {
    const ringGeo = new THREE.RingGeometry(p.ring.inner, p.ring.outer, 96);
    // tweak UVs so a canvas texture would wrap, but a flat color works fine
    const ringMat = new THREE.MeshBasicMaterial({
      color: p.ring.color,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.75
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2 - 0.35;
    if (p.ring.tilt) ring.rotation.y = p.ring.tilt;
    mesh.add(ring);
  }

  // Moons
  const moonObjs = [];
  (p.moons || []).forEach(m => {
    const mPivot = new THREE.Object3D();
    mesh.add(mPivot);

    const moonMesh = new THREE.Mesh(
      new THREE.SphereGeometry(m.size, 24, 24),
      new THREE.MeshStandardMaterial({
        map: makeTexture(m.color, { noise: 0.08, spots: 8, spotColor: '#555' }),
        roughness: 0.9
      })
    );
    moonMesh.position.x = m.distance;
    mPivot.add(moonMesh);

    moonObjs.push({ pivot: mPivot, speed: m.speed });
    allMoons.push(mPivot);
  });

  planets.push({ pivot, mesh, speed: p.speed, spin: p.spin, moons: moonObjs });
});

/* =========================================================
   UI controls
   ========================================================= */
const moonToggle  = document.getElementById('moonToggle');
const orbitToggle = document.getElementById('orbitToggle');
const speedInput  = document.getElementById('speed');

let showMoons = true;
moonToggle.addEventListener('change', () => {
  showMoons = moonToggle.checked;
  allMoons.forEach(m => (m.visible = showMoons));
});

let showOrbits = true;
orbitToggle.addEventListener('change', () => {
  showOrbits = orbitToggle.checked;
  orbitLines.forEach(l => (l.visible = showOrbits));
});

let speedFactor = 1.0;
speedInput.addEventListener('input', () => {
  speedFactor = speedInput.value / 100;
});

/* =========================================================
   Animation loop
   ========================================================= */
const clock = new THREE.Clock();
function animate() {
  const dt = clock.getDelta();
  const f = dt * speedFactor;

  // sun pulse + rotation
  sun.rotation.y += 0.0015;

  planets.forEach(p => {
    p.pivot.rotation.y += f * p.speed * 0.3;
    p.mesh.rotation.y  += p.spin * (1 + speedFactor);
    p.moons.forEach(m => (m.pivot.rotation.y += f * m.speed * 0.5));
  });

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

/* =========================================================
   Resize
   ========================================================= */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
